<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Page Not Found - Shayne's Designs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #111; color: #e8e6e1; line-height: 1.6; }
        header { background-color: #080808; padding: 1rem; border-bottom: 1px solid rgba(194,170,105,0.25); }
        header a { color: #c2aa69; text-decoration: none; font-weight: bold; font-size: 1.3rem; }
        header a:hover { color: #d4bc7a; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
        .error-section { min-height: 60vh; display: flex; align-items: center; justify-content: center; padding: 3rem 1rem; }
        .error-content { text-align: center; max-width: 600px; }
        .error-code { font-size: 5rem; font-weight: bold; color: #c2aa69; margin-bottom: 0.5rem; }
        .error-title { font-size: 2rem; color: #ffffff; margin-bottom: 1rem; }
        .error-message { font-size: 1.1rem; color: #b5b2ab; margin-bottom: 2rem; line-height: 1.8; }
        .nav-links { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; padding: 2rem; background-color: #181818; border-radius: 8px; border: 1px solid #a08840; }
        .nav-links a { display: inline-block; padding: 0.75rem 1.5rem; background-color: #c2aa69; color: #111; text-decoration: none; border-radius: 4px; transition: background-color 0.3s; font-weight: 600; }
        .nav-links a:hover { background-color: #d4bc7a; }
        .home-link { display: inline-block; padding: 1rem 2rem; background-color: #c2aa69; color: #111; text-decoration: none; border-radius: 4px; font-size: 1.1rem; font-weight: bold; transition: background-color 0.3s; margin-top: 1rem; }
        .home-link:hover { background-color: #d4bc7a; }
        footer { background-color: #080808; color: #b5b2ab; text-align: center; padding: 2rem 1rem; margin-top: 3rem; border-top: 1px solid rgba(194,170,105,0.25); }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="/">Shayne's Designs</a>
        </div>
    </header>

    <main>
        <section class="error-section">
            <div class="container">
                <div class="error-content">
                    <div class="error-code">404</div>
                    <h1 class="error-title">Page Not Found</h1>
                    <p class="error-message">
                        We couldn't find the page you're looking for. It may have been moved or deleted.
                    </p>

                    <div class="nav-links">
                        <a href="/">Home</a>
                        <a href="/blog/index.html">Blog</a>
                    </div>

                    <a href="/" class="home-link">Return to Home</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Shayne's Designs. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
